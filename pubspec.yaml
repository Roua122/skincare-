name: skincare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.0.5

  # Networking
  http: ^1.2.0

  # Local Storage (Favorites + Cache)
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Image caching (OFFLINE IMAGES FIX)
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true